<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Curator – Đăng nhập</title>
  <link rel="stylesheet" href="assets/css/global.css">
  <style>
    body { background:linear-gradient(135deg,#0f2660 0%,#1a3c8f 50%,#2563eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center; }
    .login-wrap { width:100%;max-width:420px;padding:20px; }
    .login-card { background:white;border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);padding:40px 36px; }
    .login-logo { text-align:center;margin-bottom:28px; }
    .login-logo-icon { width:56px;height:56px;background:var(--primary-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px;font-weight:900;color:white; }
    .login-logo-name { font-size:20px;font-weight:800;color:var(--gray-900); }
    .login-logo-sub  { font-size:12px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.08em; }
    .login-divider { height:1px;background:var(--gray-200);margin:24px 0; }
    .login-btn { width:100%;padding:13px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;border:none;border-radius:var(--radius-md);cursor:pointer;transition:all var(--transition); }
    .login-btn:hover { filter:brightness(1.08);transform:translateY(-1px);box-shadow:var(--shadow-md); }
    .alt-link { text-align:center;font-size:12px;color:var(--gray-500);margin-top:16px; }
    .alt-link a { color:var(--primary-light);font-weight:600; }
    .login-footer { text-align:center;margin-top:24px;font-size:11px;color:rgba(255,255,255,0.5); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">CC</div>
      <div class="login-logo-name">Clinical Curator</div>
      <div class="login-logo-sub">Pharma Logistics System</div>
    </div>
    <div>
      <div class="form-group">
        <label class="form-label">TÀI KHOẢN</label>
        <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập..." value="admin">
      </div>
      <div class="form-group">
        <label class="form-label">MẬT KHẨU</label>
        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu..." value="123456" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:20px">
        <a href="#" style="font-size:12px;color:var(--primary-light);font-weight:600">Quên mật khẩu?</a>
      </div>
      <button class="login-btn" onclick="doLogin()">Đăng nhập hệ thống</button>
    </div>
    <div class="login-divider"></div>
    <div class="alt-link">Chưa có tài khoản? <a href="#">Liên hệ Quản trị viên</a></div>
  </div>
  <div class="login-footer">© 2024 Clinical Curator · Pharma Logistics · v2.4.0</div>
</div>
<div id="toast-container"></div>
<script src="assets/js/api.js"></script>
<script>
function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if (!u || !p) { showToast('Vui lòng nhập tài khoản và mật khẩu!', 'error'); return; }
  showToast('Đang xác thực...', 'info');
  setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
}
</script>
</body>
</html>
